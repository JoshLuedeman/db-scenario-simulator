<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DB Scenario Simulator</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --orange: #f97316;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; padding: 12px; font-size: 14px;
  }

  /* --- Header --- */
  header { text-align: center; padding: 8px 0 12px; }
  header h1 { font-size: 1.25rem; font-weight: 700; }
  header p { color: var(--muted); font-size: .8rem; }

  /* --- Panels --- */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
  }
  .panel h2 { font-size: .95rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

  /* --- Connection form --- */
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-row > * { flex: 1; min-width: 0; }
  .form-row.half > * { flex: 0 0 calc(50% - 4px); }
  label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 3px; }
  input, select {
    width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: .85rem; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }

  /* --- Buttons --- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    padding: 9px 16px; border: none; border-radius: 6px; cursor: pointer;
    font-size: .85rem; font-weight: 600; transition: opacity .15s;
    color: #fff; width: 100%;
  }
  .btn:active { opacity: .8; }
  .btn-accent { background: var(--accent); }
  .btn-green  { background: var(--green); color: #000; }
  .btn-red    { background: var(--red); }
  .btn-orange { background: var(--orange); color: #000; }
  .btn-sm     { padding: 7px 12px; font-size: .8rem; width: auto; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-row .btn { flex: 1; }

  /* --- Status badge --- */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: .7rem; font-weight: 600; text-transform: uppercase;
  }
  .badge-connected    { background: var(--green); color: #000; }
  .badge-disconnected { background: var(--red); }
  .badge-running      { background: var(--green); color: #000; }
  .badge-idle         { background: var(--border); color: var(--muted); }
  .badge-error        { background: var(--red); }

  /* --- Scenario cards --- */
  #scenarios-container { display: flex; flex-direction: column; gap: 8px; }
  .scenario-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  }
  .scenario-info { flex: 1; min-width: 0; }
  .scenario-info h3 { font-size: .85rem; font-weight: 600; }
  .scenario-info p  { font-size: .72rem; color: var(--muted); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .scenario-category {
    font-size: .65rem; color: var(--accent); font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .scenario-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }

  /* --- Toast --- */
  #toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px; font-size: .82rem;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99;
    max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; }

  /* --- Misc --- */
  .conn-status { font-size: .8rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .stop-all-row { margin-top: 10px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>&#9881; DB Scenario Simulator</h1>
  <p>Mobile-friendly presenter tool</p>
</header>

<!-- Connection Panel -->
<div class="panel" id="conn-panel">
  <h2>&#128268; Connection</h2>
  <div class="conn-status">
    Status: <span id="conn-badge" class="badge badge-disconnected">Disconnected</span>
    <span id="conn-detail" style="color:var(--muted);font-size:.75rem;"></span>
  </div>

  <div id="conn-form">
    <div class="form-row">
      <div>
        <label>Database Type</label>
        <select id="db_type">
          <option value="sqlserver">SQL Server</option>
          <option value="postgres">PostgreSQL</option>
        </select>
      </div>
    </div>
    <div class="form-row half">
      <div><label>Host</label><input id="host" placeholder="localhost"></div>
      <div><label>Port</label><input id="port" type="number" placeholder="1433"></div>
    </div>
    <div class="form-row">
      <div><label>Database</label><input id="database" placeholder="scenariodb"></div>
    </div>
    <div class="form-row half">
      <div><label>Username</label><input id="username" placeholder="sa"></div>
      <div><label>Password</label><input id="password" type="password" placeholder="••••"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-accent" onclick="doConnect()">Connect</button>
    </div>
  </div>

  <div id="conn-actions" class="hidden">
    <div class="btn-row">
      <button class="btn btn-orange" onclick="deployDb()">Deploy Sample DB</button>
      <button class="btn btn-red" onclick="doDisconnect()">Disconnect</button>
    </div>
  </div>
</div>

<!-- Scenarios Panel -->
<div class="panel" id="scenarios-panel">
  <h2>&#9889; Scenarios</h2>
  <div id="scenarios-container">
    <p style="color:var(--muted);font-size:.82rem;">Connect to a database to see available scenarios.</p>
  </div>
  <div class="stop-all-row hidden" id="stop-all-row">
    <button class="btn btn-red" onclick="stopAll()">&#9724; Stop All Scenarios</button>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';

// ---- helpers ----
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function $(id) { return document.getElementById(id); }

// ---- connection ----
async function doConnect() {
  try {
    const payload = {
      db_type:  $('db_type').value,
      host:     $('host').value,
      port:     parseInt($('port').value) || ($('db_type').value === 'postgres' ? 5432 : 1433),
      database: $('database').value,
      username: $('username').value,
      password: $('password').value,
    };
    const data = await api('POST', '/api/connect', payload);
    toast(data.message);
    refreshUI();
  } catch (e) { toast('Error: ' + e.message, 4000); }
}

async function doDisconnect() {
  try {
    await api('POST', '/api/disconnect');
    toast('Disconnected');
    refreshUI();
  } catch (e) { toast('Error: ' + e.message); }
}

async function deployDb() {
  toast('Deploying sample database…', 10000);
  try {
    const data = await api('POST', '/api/deploy-sample-db');
    toast(data.message);
  } catch (e) { toast('Error: ' + e.message, 5000); }
}

// ---- scenarios ----
async function startScenario(id) {
  try {
    const data = await api('POST', `/api/scenarios/${id}/start`);
    toast(data.message);
    setTimeout(refreshScenarios, 500);
  } catch (e) { toast('Error: ' + e.message); }
}

async function stopScenario(id) {
  try {
    const data = await api('POST', `/api/scenarios/${id}/stop`);
    toast(data.message);
    setTimeout(refreshScenarios, 300);
  } catch (e) { toast('Error: ' + e.message); }
}

async function stopAll() {
  try {
    const data = await api('POST', '/api/scenarios/stop-all');
    toast(data.message);
    setTimeout(refreshScenarios, 300);
  } catch (e) { toast('Error: ' + e.message); }
}

function renderScenarios(scenarios) {
  const container = $('scenarios-container');
  if (!scenarios.length) {
    container.innerHTML = '<p style="color:var(--muted);font-size:.82rem;">Connect to a database to see available scenarios.</p>';
    $('stop-all-row').classList.add('hidden');
    return;
  }

  // Group by category
  const groups = {};
  scenarios.forEach(s => {
    (groups[s.category] = groups[s.category] || []).push(s);
  });

  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    html += `<div class="scenario-category">${cat}</div>`;
    items.forEach(s => {
      const running = s.status === 'running';
      const badgeCls = s.status === 'running' ? 'badge-running' : s.status === 'error' ? 'badge-error' : 'badge-idle';
      html += `
        <div class="scenario-card">
          <div class="scenario-info">
            <h3>${s.name} <span class="badge ${badgeCls}">${s.status}</span></h3>
            <p>${s.description}</p>
          </div>
          <div class="scenario-actions">
            ${running
              ? `<button class="btn btn-red btn-sm" onclick="stopScenario('${s.id}')">&#9724; Stop</button>`
              : `<button class="btn btn-green btn-sm" onclick="startScenario('${s.id}')">&#9654; Start</button>`
            }
          </div>
        </div>`;
    });
  }
  container.innerHTML = html;
  $('stop-all-row').classList.toggle('hidden', !scenarios.some(s => s.status === 'running'));
}

// ---- refresh loop ----
async function refreshScenarios() {
  try {
    const data = await api('GET', '/api/scenarios');
    renderScenarios(data);
  } catch (e) { /* silent */ }
}

async function refreshUI() {
  try {
    const info = await api('GET', '/api/connection');
    const connected = info.connected;
    $('conn-badge').className = 'badge ' + (connected ? 'badge-connected' : 'badge-disconnected');
    $('conn-badge').textContent = connected ? 'Connected' : 'Disconnected';
    $('conn-detail').textContent = connected ? `${info.db_type} · ${info.host}:${info.port} · ${info.database}` : '';
    $('conn-form').classList.toggle('hidden', connected);
    $('conn-actions').classList.toggle('hidden', !connected);
    refreshScenarios();
  } catch (e) { /* silent */ }
}

// Auto-fill port based on db type selection
$('db_type').addEventListener('change', () => {
  $('port').placeholder = $('db_type').value === 'postgres' ? '5432' : '1433';
});

// Initial load
refreshUI();
// Poll scenario status every 3s
setInterval(refreshScenarios, 3000);
</script>
</body>
</html>
